<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neuro-Mechanical Animal | Somatic Healing</title>
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap](https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap)" rel="stylesheet">
    <style>
        /* Da Vinci & Low Blue Light Structural Aesthetic */
        :root {
            --bg-parchment: #eedfc4;       /* Solid golden parchment */
            --bg-dark-block: #1e1a15;      /* Structural charcoal */
            --text-dark: #2c2217;          /* Deep sepia ink */
            --text-light: #f5edd7;         /* Antique text */
            --gold-accent: #b8860b;        /* Renaissance amber */
            --gold-glow: #e5c158;          /* Glowing gold */
            --border-ink: #8a765d;         /* Structural lines */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-parchment);
            color: var(--text-dark);
            font-family: 'Libre Baskerville', serif;
            line-height: 1.6;
            margin: 0;
        }

        /* Top Floating Booking Banner */
        .top-nav {
            background-color: #1a1510;
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--gold-accent);
            display: flex;
            justify-content: center;
        }

        .nav-btn {
            color: var(--gold-glow);
            text-decoration: none;
            border: 1px solid var(--gold-accent);
            padding: 10px 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--gold-accent);
            color: #1a1510;
        }

        .main-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 25px;
        }

        /* Header Style */
        header {
            text-align: center;
            margin-bottom: 70px;
            padding-bottom: 30px;
            border-bottom: 1px double var(--border-ink);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #1a1510;
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            color: #5c4a37;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Grid Layouts for Content */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 50px;
            margin-bottom: 80px;
            align-items: center;
        }

        @media (max-width: 850px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .sketch-side {
                order: -1;
                margin: 0 auto;
            }
        }

        h2 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            color: #1a1510;
            border-bottom: 1px solid var(--border-ink);
            padding-bottom: 8px;
        }

        h3 {
            font-size: 1.4rem;
            margin-top: 35px;
            margin-bottom: 15px;
            color: #1a1510;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: justify;
        }

        .sketch-side {
            text-align: center;
        }

        .sketch-side img {
            width: 100%;
            max-width: 320px;
            height: auto;
            opacity: 0.9;
            mix-blend-mode: multiply;
            filter: sepia(0.2);
            margin-bottom: 15px;
        }

        .sketch-btn {
            display: inline-block;
            color: #1a1510;
            text-decoration: none;
            border: 1px solid var(--border-ink);
            padding: 8px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sketch-btn:hover {
            background-color: var(--border-ink);
            color: var(--bg-parchment);
        }

        /* Dark Practitioner Bio Block */
        .practitioner-block {
            background-color: var(--bg-dark-block);
            color: var(--text-light);
            padding: 50px;
            margin: 60px -30px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 45px;
            border-top: 4px solid var(--gold-accent);
            border-bottom: 4px solid var(--gold-accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        @media (max-width: 750px) {
            .practitioner-block {
                grid-template-columns: 1fr;
                text-align: center;
                padding: 40px 20px;
            }
            .photo-frame {
                margin: 0 auto;
            }
        }

        .photo-frame {
            width: 260px;
            height: 340px;
            border: 2px solid var(--gold-glow);
            overflow: hidden;
            background-color: #110e0b;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .practitioner-info h2 {
            color: var(--gold-glow);
            border-bottom: 1px solid #4a3e31;
            margin-bottom: 5px;
        }

        .practitioner-info p {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .meta-tags {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--gold-glow);
            margin-bottom: 20px;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .contact-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-outline {
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;
            color: var(--gold-glow);
            border: 1px solid var(--gold-glow);
            padding: 12px 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background-color: var(--gold-glow);
            color: var(--bg-dark-block);
        }

        /* Digital Guides Card Grid */
        .offers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }

        @media (max-width: 650px) {
            .offers-grid {
                grid-template-columns: 1fr;
            }
        }

        .guide-card {
            border: 1px solid var(--border-ink);
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .guide-card.full-bundle {
            grid-column: 1 / -1;
            border: 2px solid var(--gold-accent);
            background-color: rgba(184, 134, 11, 0.05);
        }

        .price-tag {
            font-size: 1.8rem;
            color: #1a1510;
            font-weight: 700;
            margin: 15px 0;
        }

        .buy-link {
            display: inline-block;
            margin-top: 20px;
            color: #1a1510;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-decoration: none;
        }

        /* Rates Formatting */
        .rates-list {
            list-style: none;
            margin: 20px 0 40px 0;
        }
