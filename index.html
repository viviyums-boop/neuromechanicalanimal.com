<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neuro-Mechanical Animal | Somatic Healing</title>
    <style>
        /* Da Vinci & Low Blue Light Structural Aesthetic */
        :root {
            --bg-parchment: #eedfc4;       /* Solid golden parchment paper color */
            --bg-dark-block: #1e1a15;     /* Structural charcoal contrast for profile */
            --text-dark: #2c2217;         /* Deep sepia ink for optimal parchment reading */
            --text-light: #f5edd7;        /* Soft antique text for the dark block */
            --gold-accent: #b8860b;       /* Renaissance raw amber/gold */
            --gold-glow: #e5c158;         /* Glowing accent gold */
            --border-ink: #8a765d;        /* Sketch-like structural border lines */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-parchment);
            color: var(--text-dark);
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
        }

        /* Top Floating Booking Banner */
        .top-nav {
            background-color: #1a1510;
            padding: 12px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--gold-accent);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn {
            color: var(--gold-glow);
            text-decoration: none;
            border: 1px solid var(--gold-accent);
            padding: 8px 18px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--gold-accent);
            color: #1a1510;
        }

        .main-wrapper {
            max-width: 950px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Style */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 1px double var(--border-ink);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: normal;
            letter-spacing: 1px;
            color: #1a1510;
            margin-bottom: 5px;
        }

        .subtitle {
            font-style: italic;
            color: #5c4a37;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Multi-column Grid for Sketches and Narrative */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 40px;
            margin-bottom: 60px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .sketch-side {
                order: -1;
                margin: 0 auto;
            }
        }

        h2 {
            font-size: 1.6rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #1a1510;
            border-bottom: 1px solid var(--border-ink);
            padding-bottom: 5px;
        }

        p {
            margin-bottom: 18px;
            font-size: 1.05rem;
            text-align: justify;
        }

        .sketch-side img {
            width: 100%;
            max-width: 300px;
            height: auto;
            opacity: 0.85;
            mix-blend-mode: multiply; /* Blends sketch background layers cleanly into the solid golden parchment color */
        }

        /* Dark High-Contrast Practitioner Block */
        .practitioner-block {
            background-color: var(--bg-dark-block);
            color: var(--text-light);
            padding: 40px;
            margin: 40px -20px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 35px;
            border-top: 3px solid var(--gold-accent);
            border-bottom: 3px solid var(--gold-accent);
        }

        @media (max-width: 650px) {
            .practitioner-block {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .photo-frame {
                margin: 0 auto;
            }
        }

        .photo-frame {
            width: 220px;
            height: 290px;
            border: 2px solid var(--gold-glow);
            box-shadow: 0 0 15px rgba(229, 193, 88, 0.2);
            overflow: hidden;
            background-color: #110e0b;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .practitioner-info h2 {
            color: var(--gold-glow);
            border-bottom: 1px solid #4a3e31;
        }

        .practitioner-info p {
            color: var(--text-light);
        }

        .meta-tags {
            font-size: 0.9rem;
            color: var(--gold-glow);
            margin-bottom: 15px;
            font-style: italic;
        }

        .contact-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
